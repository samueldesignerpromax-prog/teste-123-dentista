<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Agendar Consulta</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>📅 Agendar Consulta</h1>
        <form id="form-agendamento">
            <label>Nome completo *</label>
            <input type="text" id="nome" required>

            <label>Email</label>
            <input type="email" id="email">

            <label>Telefone *</label>
            <input type="text" id="telefone" required>

            <label>Dentista *</label>
            <select id="dentista_id" required>
                {% for d in dentistas %}
                <option value="{{ d.id }}">{{ d.nome }} ({{ d.especialidade }})</option>
                {% endfor %}
            </select>

            <label>Serviço *</label>
            <select id="servico_id" required>
                {% for s in servicos %}
                <option value="{{ s.id }}">{{ s.nome }} ({{ s.duracao_minutos }}min)</option>
                {% endfor %}
            </select>

            <label>Data *</label>
            <input type="date" id="data" required>

            <label>Horário *</label>
            <select id="horario" required>
                <option value="">Selecione a data primeiro</option>
            </select>

            <button type="submit">Agendar</button>
        </form>
        <div id="resultado"></div>
        <p><a href="/">Voltar</a></p>
    </div>

    <script>
        const form = document.getElementById('form-agendamento');
        const dataInput = document.getElementById('data');
        const dentistaSelect = document.getElementById('dentista_id');
        const horarioSelect = document.getElementById('horario');
        const resultadoDiv = document.getElementById('resultado');

        async function carregarHorarios() {
            const data = dataInput.value;
            const dentistaId = dentistaSelect.value;
            if (!data || !dentistaId) {
                horarioSelect.innerHTML = '<option value="">Selecione data e dentista</option>';
                return;
            }
            try {
                const resp = await fetch(`/api/horarios?data=${data}&dentista_id=${dentistaId}`);
                const horarios = await resp.json();
                horarioSelect.innerHTML = '';
                if (horarios.length === 0) {
                    horarioSelect.innerHTML = '<option value="">Nenhum horário disponível</option>';
                } else {
                    horarios.forEach(h => {
                        const opt = document.createElement('option');
                        opt.value = h;
                        opt.textContent = h;
                        horarioSelect.appendChild(opt);
                    });
                }
            } catch (err) {
                horarioSelect.innerHTML = '<option value="">Erro ao carregar</option>';
            }
        }

        dataInput.addEventListener('change', carregarHorarios);
        dentistaSelect.addEventListener('change', carregarHorarios);

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const dados = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value,
                dentista_id: parseInt(document.getElementById('dentista_id').value),
                servico_id: parseInt(document.getElementById('servico_id').value),
                data_hora: `${document.getElementById('data').value}T${document.getElementById('horario').value}`
            };
            try {
                const resp = await fetch('/api/agendar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });
                const result = await resp.json();
                if (resp.ok) {
                    resultadoDiv.innerHTML = `<p class="sucesso">✅ Agendamento realizado! ID: ${result.id}</p>`;
                    form.reset();
                    horarioSelect.innerHTML = '<option value="">Selecione a data primeiro</option>';
                } else {
                    resultadoDiv.innerHTML = `<p class="erro">❌ Erro: ${result.erro || 'Tente novamente'}</p>`;
                }
            } catch (err) {
                resultadoDiv.innerHTML = `<p class="erro">❌ Erro de conexão.</p>`;
            }
        });
    </script>
</body>
</html>
